<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Domain warp: displace the noise field with itself first -->
    <filter id="art" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">

      <!-- Warp layer -->
      <feTurbulence type="turbulence" baseFrequency="0.018 0.012" numOctaves="4" seed="42" result="warp"/>

      <!-- Main noise field -->
      <feTurbulence type="turbulence" baseFrequency="0.009 0.007" numOctaves="6" seed="7" result="noise"/>

      <!-- Displace the noise with the warp — creates domain warp effect -->
      <feDisplacementMap in="noise" in2="warp" scale="80"
        xChannelSelector="R" yChannelSelector="G" result="warped"/>

      <!-- Collapse to single channel -->
      <feColorMatrix type="saturate" values="0" in="warped" result="gray"/>

      <!-- Map grayscale to cosmic palette:
           [0,0,4] [4,0,18] [18,0,55] [55,8,115] [115,28,175] [178,95,238] [240,200,255] -->
      <feComponentTransfer in="gray" result="colored">
        <feFuncR type="table" tableValues="0 0.016 0.071 0.216 0.451 0.698 0.941"/>
        <feFuncG type="table" tableValues="0 0     0     0.031 0.110 0.373 0.784"/>
        <feFuncB type="table" tableValues="0.016 0.071 0.216 0.451 0.686 0.933 1.0"/>
      </feComponentTransfer>

      <!-- Slight brightness boost -->
      <feComponentTransfer in="colored">
        <feFuncR type="gamma" amplitude="1.1" exponent="0.85" offset="0.02"/>
        <feFuncG type="gamma" amplitude="1.1" exponent="0.85" offset="0.01"/>
        <feFuncB type="gamma" amplitude="1.1" exponent="0.80" offset="0.03"/>
      </feComponentTransfer>

    </filter>

    <!-- Vignette: dark edges -->
    <radialGradient id="vig" cx="50%" cy="50%" r="52%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Clip to rounded square -->
    <clipPath id="rnd">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>

  </defs>

  <g clip-path="url(#rnd)">
    <rect width="512" height="512" fill="#000"/>
    <rect width="512" height="512" filter="url(#art)"/>
    <rect width="512" height="512" fill="url(#vig)"/>
  </g>

</svg>
