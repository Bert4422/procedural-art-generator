<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Abstract</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
#c{position:fixed;top:0;left:0;display:block;width:100vw;height:100vh;transition:opacity .45s ease}
@keyframes ldpulse{0%,100%{opacity:.1}50%{opacity:.32}}
#loading{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  color:rgba(255,255,255,.22);font:10px/1 system-ui,sans-serif;
  letter-spacing:5px;text-transform:uppercase;pointer-events:none;display:none;
  animation:ldpulse 1.4s ease-in-out infinite;
}
#ui{position:fixed;inset:0;pointer-events:none;transition:opacity .35s}
#ui>*{pointer-events:all}
.btn{
  position:fixed;background:rgba(0,0,0,.45);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.09);
  color:rgba(255,255,255,.65);font:11px/1 system-ui,sans-serif;letter-spacing:.6px;
  padding:10px 18px;cursor:pointer;border-radius:8px;
  transition:background .2s,color .2s,border-color .2s;user-select:none;-webkit-user-select:none;
}
.btn:hover{background:rgba(0,0,0,.65);color:#fff;border-color:rgba(255,255,255,.22)}
.btn:active{background:rgba(0,0,0,.8)}
.btn.lit{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28);color:#fff}
#bTune{top:20px;left:20px}
#bInv{bottom:70px;left:20px}
#bHide{
  top:20px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04);
  color:rgba(255,255,255,.15);pointer-events:all;position:fixed;
}
#bHide:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.38);border-color:rgba(255,255,255,.1)}
#bOpt{top:20px;right:20px}
#bRand{bottom:26px;left:20px}
#bSave{bottom:26px;right:20px}
/* Timeline row — contains history nav + scroll + dots */
#tlwrap{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:4px;pointer-events:all;
  background:rgba(0,0,0,.38);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:7px 10px;
}
#timeline{display:flex;gap:8px;align-items:center;}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:transparent;border:1.5px solid rgba(255,255,255,.28);
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.dot.cur{background:#fff;border-color:#fff;box-shadow:0 0 5px rgba(255,255,255,.5);}
.dot:hover{border-color:rgba(255,255,255,.7);}
.tlarr{
  background:none;border:none;color:rgba(255,255,255,.25);
  font-size:14px;cursor:pointer;padding:0 4px;line-height:1;
  transition:color .15s;user-select:none;-webkit-user-select:none;
}
.tlarr:hover{color:rgba(255,255,255,.7)}
.tlarr:disabled{opacity:.1;cursor:default;pointer-events:none}
/* History ← → slightly more prominent than scroll ‹ › */
#bBack,#bFwd{color:rgba(255,255,255,.4);font-size:15px;}
#bBack:hover,#bFwd:hover{color:rgba(255,255,255,.85)}
#bBack:disabled,#bFwd:disabled{opacity:.1;cursor:default;pointer-events:none}
/* Divider between history and scroll arrows */
.tldiv{width:1px;height:12px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0;}
/* Panel */
#panel{
  position:fixed;top:70px;right:20px;width:272px;
  background:rgba(7,7,7,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  box-shadow:0 10px 50px rgba(0,0,0,.65);
  flex-direction:column;overflow:hidden;z-index:200;touch-action:none;
  display:none;
}
#panel.open{display:flex}
#ph{
  padding:14px 16px;font:11px/1 system-ui,sans-serif;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(255,255,255,.35);
  border-bottom:1px solid rgba(255,255,255,.07);cursor:grab;
  display:flex;justify-content:space-between;align-items:center;user-select:none;
}
#ph:active{cursor:grabbing}
#pclose{color:rgba(255,255,255,.3);cursor:pointer;font-size:17px;line-height:1;padding:0 2px}
#pclose:hover{color:rgba(255,255,255,.8)}
#pbody{padding:14px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;max-height:72vh}
.og{display:flex;flex-direction:column;gap:5px}
.og label{font:10px/1 system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.28)}
.og select{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.72);padding:8px 10px;font:12px system-ui,sans-serif;
  border-radius:4px;cursor:pointer;-webkit-appearance:none;appearance:none;
}
.og select:focus{outline:none;border-color:rgba(255,255,255,.28)}
.og select option{background:#1a1a1a;color:rgba(255,255,255,.85);}
.og select optgroup{background:#111;color:rgba(255,255,255,.4);}
.srow{display:flex;align-items:center;gap:10px}
.srow input{flex:1;background:rgba(255,255,255,.1);border:none;border-radius:2px;height:4px;accent-color:rgba(255,255,255,.6);cursor:pointer}
.sv{font:11px 'Courier New',monospace;color:rgba(255,255,255,.38);width:16px;text-align:right}
.orow{display:flex;gap:8px}
.ob{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);padding:8px;font:11px system-ui,sans-serif;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .2s;
}
.ob.on{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.88)}
#pgen{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.8);padding:11px;font:11px system-ui,sans-serif;
  letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;border-radius:4px;
  transition:all .2s;margin-top:3px;
}
#pgen:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28);color:#fff}
/* Tune panel — same format as Settings, anchored left */
#tune{
  position:fixed;top:70px;left:20px;width:272px;
  background:rgba(7,7,7,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  box-shadow:0 10px 50px rgba(0,0,0,.65);
  flex-direction:column;overflow:hidden;z-index:200;touch-action:none;
  display:none;
}
#tune.open{display:flex}
#th{
  padding:14px 16px;font:11px/1 system-ui,sans-serif;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(255,255,255,.35);
  border-bottom:1px solid rgba(255,255,255,.07);cursor:grab;
  display:flex;justify-content:space-between;align-items:center;user-select:none;
}
#th:active{cursor:grabbing}
#tclose{color:rgba(255,255,255,.3);cursor:pointer;font-size:17px;line-height:1;padding:0 2px}
#tclose:hover{color:rgba(255,255,255,.8)}
#tbody{padding:14px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;max-height:72vh}
/* Tune-specific inputs */
.tnuminput{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.72);padding:8px 10px;font:12px system-ui,sans-serif;
  border-radius:4px;outline:none;
}
.tnuminput:focus{border-color:rgba(255,255,255,.28)}
.tnuminput::placeholder{color:rgba(255,255,255,.2)}
.tformula{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.78);padding:8px 10px;font:11px 'Courier New',monospace;
  border-radius:4px;outline:none;resize:none;height:56px;
}
.tformula:focus{border-color:rgba(255,255,255,.28)}
.tformula::placeholder{color:rgba(255,255,255,.18);font-style:italic}
.tformulavars{
  font:9.5px system-ui,sans-serif;color:rgba(255,255,255,.22);
  letter-spacing:.3px;line-height:1.5;margin-top:2px;
}
.tformulavars b{color:rgba(255,255,255,.38)}
#tapply{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.8);padding:11px;font:11px system-ui,sans-serif;
  letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;border-radius:4px;
  transition:all .2s;margin-top:3px;
}
#tapply:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28);color:#fff}
#tapply:disabled{opacity:.3;cursor:default}
/* Divider label inside tune panel */
.tsec{
  font:9px/1 system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.18);padding:4px 0 2px;border-top:1px solid rgba(255,255,255,.06);
  margin-top:2px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">Generating</div>

<button class="btn" id="bHide" onclick="toggleUI()">&#9898;</button>

<div id="ui">
  <button class="btn" id="bTune" onclick="toggleTune()">Tune</button>
  <button class="btn" id="bOpt" onclick="togglePanel()">Settings</button>
  <button class="btn" id="bInv" onclick="toggleInvert()">Invert</button>
  <button class="btn" id="bRand" onclick="generate()">Random</button>
  <button class="btn" id="bSave" onclick="savePNG()">Save PNG</button>
  <div id="tlwrap">
    <button class="tlarr" id="bBack" onclick="goBack()">&#8592;</button>
    <div class="tldiv"></div>
    <button class="tlarr" id="tlLeft" onclick="tlScroll(-1)">&#8249;</button>
    <div id="timeline"></div>
    <button class="tlarr" id="tlRight" onclick="tlScroll(1)">&#8250;</button>
    <div class="tldiv"></div>
    <button class="tlarr" id="bFwd" onclick="goForward()">&#8594;</button>
  </div>
</div>

<div id="panel">
  <div id="ph"><span>Settings</span><span id="pclose" onclick="togglePanel()">×</span></div>
  <div id="pbody">
    <div class="og">
      <label>Family</label>
      <select id="sFam" onchange="rebuildAlgos()">
        <option value="random">Random</option>
        <option value="abstract">Abstract</option>
        <option value="psychedelic">Psychedelic</option>
        <option value="organic">Organic</option>
      </select>
    </div>
    <div class="og">
      <label>Algorithm</label>
      <select id="sAlg"><option value="random">Random</option></select>
    </div>
    <div class="og">
      <label>Palette</label>
      <select id="sPal">
        <option value="random">Random</option>
        <optgroup label="Psychedelic">
          <option value="acid">Acid</option>
          <option value="aurora">Aurora</option>
          <option value="plasma">Plasma</option>
          <option value="chromatic">Chromatic</option>
          <option value="neon">Neon</option>
        </optgroup>
        <optgroup label="Organic">
          <option value="fungal">Fungal</option>
          <option value="lush">Lush</option>
          <option value="biolum">Bioluminescent</option>
          <option value="mycelium">Mycelium</option>
          <option value="spore">Spore</option>
        </optgroup>
        <optgroup label="Warm">
          <option value="magma">Magma</option>
          <option value="sunset">Sunset</option>
          <option value="ember">Ember</option>
          <option value="rust">Rust</option>
        </optgroup>
        <optgroup label="Cool">
          <option value="cosmic">Cosmic</option>
          <option value="deepocean">Deep Ocean</option>
          <option value="crystal">Crystal</option>
          <option value="arctic">Arctic</option>
        </optgroup>
        <optgroup label="Minimal">
          <option value="mono">Monochrome</option>
          <option value="chalk">Chalk</option>
          <option value="obsidian">Obsidian</option>
        </optgroup>
      </select>
    </div>
    <div class="og">
      <label>Complexity</label>
      <div class="srow">
        <input type="range" id="sComp" min="1" max="10" value="5"
               oninput="document.getElementById('vComp').textContent=this.value">
        <span class="sv" id="vComp">5</span>
      </div>
    </div>
    <div class="og">
      <label>Symmetry</label>
      <select id="sSym">
        <option value="none">None</option>
        <option value="mirror">Mirror</option>
        <option value="mirrorxy">Mirror XY</option>
        <option value="radial3">Radial × 3</option>
        <option value="radial4">Radial × 4</option>
        <option value="radial6">Radial × 6</option>
        <option value="radial8">Radial × 8</option>
      </select>
    </div>
    <div class="og">
      <label>Orientation</label>
      <div class="orow">
        <button class="ob on" id="bLand" onclick="setOrient('landscape')">Landscape</button>
        <button class="ob" id="bPort" onclick="setOrient('portrait')">Portrait</button>
      </div>
    </div>
    <button id="pgen" onclick="generate()">Generate</button>
  </div>
</div>

<!-- ══ Tune panel ══════════════════════════════════════════════════ -->
<div id="tune">
  <div id="th"><span>Tune</span><span id="tclose" onclick="toggleTune()">×</span></div>
  <div id="tbody">

    <!-- Seed lock -->
    <div class="og">
      <label>Seed</label>
      <div class="srow">
        <input type="number" id="tSeed" class="tnuminput" placeholder="auto (random)"
               min="0" max="9999999" step="1" style="flex:1">
        <button onclick="document.getElementById('tSeed').value=''"
          style="background:none;border:none;color:rgba(255,255,255,.3);font-size:15px;cursor:pointer;padding:0 4px;line-height:1"
          title="Clear (use random seed)">×</button>
      </div>
    </div>

    <!-- Per-algorithm sliders — filled by buildTunePanel() -->
    <div id="tAlgParams"></div>

    <!-- Math formula -->
    <div class="og">
      <div class="tsec">Colour Formula</div>
      <textarea id="tFormula" class="tformula"
        placeholder="e.g.  sin(x*8)*cos(y*6)*0.5+0.5&#10;      sqrt((x-.5)*(x-.5)+(y-.5)*(y-.5))*2&#10;      v  (passthrough)"></textarea>
      <div class="tformulavars">
        <b>x y</b> coords 0–1 &nbsp;·&nbsp; <b>v</b> raw value &nbsp;·&nbsp; <b>s</b> seed<br>
        <b>sin cos tan sqrt abs pow log floor PI</b>
      </div>
    </div>

    <button id="tapply" onclick="applyTune()">Apply &amp; Generate</button>
  </div>
</div>

<script>
// ═══ Canvas & State ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W=0, H=0;
let orient   = 'landscape';
let inverted = false;
let uiHidden = false;
let hist     = [], hIdx = -1;
let busy     = false, cancelFlag = false;

// ═══ Per-algorithm tune parameter definitions ═════════════════════════
const ALG_PARAMS = {
  attractor:          [],
  harmonograph: [
    {id:'freqMax',    label:'Freq Range',    min:2,    max:14,   step:0.5,  def:7,    fmt:v=>v.toFixed(1)},
    {id:'dampScale',  label:'Damping',       min:0.2,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
  ],
  subdivision: [
    {id:'splitBias',  label:'H / V Bias',   min:0,    max:1,    step:0.05, def:0.5,  fmt:v=>v.toFixed(2)},
    {id:'colorDrift', label:'Colour Drift',  min:0.02, max:0.5,  step:0.02, def:0.18, fmt:v=>v.toFixed(2)},
  ],
  fourier: [
    {id:'freqMax',    label:'Freq Range',    min:2,    max:22,   step:1,    def:16,   fmt:v=>v|0},
    {id:'harmonics',  label:'Harmonics',     min:2,    max:16,   step:1,    def:5,    fmt:v=>v|0},
  ],
  plasma: [
    {id:'freqScale',  label:'Frequency',     min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
    {id:'gamma',      label:'Contrast',      min:0.3,  max:1.6,  step:0.05, def:0.82, fmt:v=>v.toFixed(2)},
  ],
  domainwarp: [
    {id:'warpStr',    label:'Warp Strength', min:0.1,  max:2.5,  step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
    {id:'octBonus',   label:'Detail',        min:0,    max:5,    step:1,    def:0,    fmt:v=>v|0},
  ],
  mandala: [
    {id:'folds',      label:'Fold Count',    type:'select', options:[4,5,6,7,8,9,12], def:6},
    {id:'gamma',      label:'Contrast',      min:0.3,  max:1.5,  step:0.05, def:0.85, fmt:v=>v.toFixed(2)},
  ],
  reactiondiffusion: [
    {id:'rdF',        label:'Feed Rate',     min:0.01, max:0.08, step:0.001,def:0.035,fmt:v=>v.toFixed(3)},
    {id:'rdK',        label:'Kill Rate',     min:0.04, max:0.075,step:0.001,def:0.065,fmt:v=>v.toFixed(3)},
  ],
  fractalifs: [
    {id:'tfCount',    label:'Transforms',    min:2,    max:8,    step:1,    def:4,    fmt:v=>v|0},
  ],
  flowfield: [
    {id:'noiseScale', label:'Noise Scale',   min:0.3,  max:5,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
    {id:'stepScale',  label:'Step Size',     min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
  ],
  spacecolonization: [
    {id:'reach',      label:'Branch Reach',  min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
    {id:'segScale',   label:'Seg Length',    min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
  ],
  metaballs: [
    {id:'iso',        label:'Blob Surface',  min:0.4,  max:1.4,  step:0.02, def:0.82, fmt:v=>v.toFixed(2)},
    {id:'sizeScale',  label:'Blob Size',     min:0.4,  max:2.5,  step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
  ],
  differentialgrowth: [
    {id:'repScale',   label:'Repulsion',     min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
    {id:'distScale',  label:'Spacing',       min:0.3,  max:3,    step:0.1,  def:1,    fmt:v=>v.toFixed(1)},
  ],
};

// ═══ Algorithms ═══════════════════════════════════════════════════════
const ALGOS = {
  abstract:    ['attractor','harmonograph','subdivision','fourier'],
  psychedelic: ['plasma','domainwarp','mandala','reactiondiffusion','fractalifs'],
  organic:     ['flowfield','spacecolonization','metaballs','differentialgrowth'],
};
const ALGO_NAMES = {
  attractor:'Strange Attractor', harmonograph:'Harmonograph',
  subdivision:'Recursive Subdivision', fourier:'Fourier Curves',
  plasma:'Plasma Field', domainwarp:'Domain Warp',
  mandala:'Mandala', reactiondiffusion:'Reaction-Diffusion',
  fractalifs:'Fractal IFS', flowfield:'Flow Field',
  spacecolonization:'Space Colonization', metaballs:'Metaballs',
  differentialgrowth:'Differential Growth',
};

// ═══ Palettes — gradient stop arrays [r,g,b] ══════════════════════════
const PAL = {
  acid:      [[8,0,12],[80,0,120],[200,0,200],[255,80,0],[255,220,0],[180,255,50],[255,255,255]],
  aurora:    [[0,5,12],[0,35,60],[0,100,70],[20,190,120],[100,255,170],[200,240,255],[255,255,255]],
  plasma:    [[4,0,8],[55,0,75],[150,0,140],[230,50,100],[255,130,0],[255,240,60],[255,255,255]],
  chromatic: [[8,0,4],[190,0,60],[255,40,210],[40,0,255],[0,180,255],[100,255,200],[255,255,255]],
  neon:      [[0,0,0],[30,0,60],[0,180,180],[180,0,255],[255,0,120],[255,255,0],[255,255,255]],
  fungal:    [[4,2,0],[28,10,4],[65,30,8],[115,60,18],[160,100,48],[200,150,95],[235,215,185]],
  lush:      [[0,4,0],[4,22,4],[14,55,8],[28,95,18],[58,145,28],[115,195,75],[200,240,155]],
  biolum:    [[0,2,6],[0,12,35],[0,38,75],[0,95,115],[0,195,145],[45,255,195],[200,255,240]],
  mycelium:  [[7,4,9],[32,18,38],[78,45,85],[138,85,126],[190,138,165],[222,188,208],[248,238,248]],
  spore:     [[2,1,0],[20,10,15],[60,30,50],[120,60,90],[185,110,140],[230,170,190],[255,230,240]],
  magma:     [[0,0,0],[38,0,0],[115,8,0],[218,55,0],[255,135,0],[255,215,45],[255,255,195]],
  sunset:    [[4,0,8],[55,0,55],[178,18,75],[255,75,45],[255,155,38],[255,218,115],[255,248,220]],
  ember:     [[4,1,0],[38,4,0],[118,18,0],[195,58,0],[255,115,18],[255,195,75],[255,248,200]],
  rust:      [[3,1,0],[45,12,4],[115,42,8],[188,75,18],[228,128,48],[244,182,108],[255,238,200]],
  cosmic:    [[0,0,4],[4,0,18],[18,0,55],[55,8,115],[115,28,175],[178,95,238],[240,200,255]],
  deepocean: [[0,2,6],[0,8,28],[0,22,65],[0,55,115],[0,115,155],[18,195,205],[145,238,255]],
  crystal:   [[2,4,9],[8,22,48],[18,55,115],[38,115,198],[75,178,255],[158,218,255],[228,248,255]],
  arctic:    [[4,7,14],[14,28,58],[28,68,128],[58,128,198],[118,188,238],[188,228,255],[242,252,255]],
  mono:      [[0,0,0],[18,18,18],[55,55,55],[115,115,115],[178,178,178],[218,218,218],[255,255,255]],
  chalk:     [[4,4,4],[28,26,23],[75,70,65],[138,132,126],[195,188,183],[232,228,224],[252,250,248]],
  obsidian:  [[0,0,0],[9,4,7],[28,12,18],[68,28,38],[128,58,68],[198,118,108],[255,198,188]],
};
const PAL_KEYS = Object.keys(PAL);
const RANDOM_PAL_KEYS = PAL_KEYS.filter(k => !['mono','chalk','obsidian'].includes(k));

// ═══ Seeded RNG ═══════════════════════════════════════════════════════
function mkrng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return () => {
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}

// ═══ Color helpers ═════════════════════════════════════════════════════
function palRGB(key, t) {
  const p = PAL[key] || PAL.acid;
  t = Math.max(0, Math.min(0.9999, t));
  const n = p.length - 1, i = Math.floor(t*n), f = t*n - i;
  const a = p[i], b = p[i+1];
  return [a[0]+(b[0]-a[0])*f|0, a[1]+(b[1]-a[1])*f|0, a[2]+(b[2]-a[2])*f|0];
}
const rgb  = (r,g,b,a=1) => a<1 ? `rgba(${r},${g},${b},${a})` : `rgb(${r},${g},${b})`;
const cstr = (key, t, a=1) => { const [r,g,b]=palRGB(key,t); return rgb(r,g,b,a); };

// ═══ Noise ════════════════════════════════════════════════════════════
function h2(x,y,s){ let n=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453; return n-Math.floor(n); }
function sn(x,y,s){
  let ix=x|0, iy=y|0, fx=x-ix, fy=y-iy;
  fx=fx*fx*(3-2*fx); fy=fy*fy*(3-2*fy);
  return h2(ix,iy,s)+(h2(ix+1,iy,s)-h2(ix,iy,s))*fx
        +(h2(ix,iy+1,s)-h2(ix,iy,s))*fy
        +(h2(ix,iy,s)-h2(ix+1,iy,s)-h2(ix,iy+1,s)+h2(ix+1,iy+1,s))*fx*fy;
}
function fbm(x,y,s,o=4){
  let v=0,a=0.5,f=1,t=0;
  for(let i=0;i<o;i++){v+=sn(x*f,y*f,s+i*137)*a;t+=a;a*=0.5;f*=2.1;}
  return v/t;
}

// ═══ Canvas resize ════════════════════════════════════════════════════
function resizeCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  canvas.style.transform = '';
  canvas.style.transformOrigin = '';
  if (orient === 'portrait' && vw > vh) {
    // Desktop landscape screen in portrait mode:
    // show a centred 9:16 rectangle with black bars on each side
    H = vh;
    W = Math.round(vh * 9 / 16);
    if (W > vw) { W = vw; H = Math.round(vw * 16 / 9); }
    canvas.width = W; canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.left   = Math.round((vw - W) / 2) + 'px';
    canvas.style.top    = Math.round((vh - H) / 2) + 'px';
  } else {
    // Landscape, or a real portrait screen — fill it
    W = vw; H = vh;
    canvas.width = W; canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.left   = '0';
    canvas.style.top    = '0';
  }
}

// ═══ Offscreen helper ════════════════════════════════════════════════
function mkoff(w,h) {
  const o = document.createElement('canvas');
  o.width=w; o.height=h; return o;
}

// ═══ Tune panel ══════════════════════════════════════════════════════
function toggleTune() {
  const el = document.getElementById('tune');
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    const alg = hIdx >= 0 ? hist[hIdx].algorithm : '';
    buildTunePanel(alg);
  }
  document.getElementById('bTune').classList.toggle('lit', el.classList.contains('open'));
}

function buildTunePanel(alg) {
  const box = document.getElementById('tAlgParams');
  box.innerHTML = '';
  const defs = ALG_PARAMS[alg] || [];
  if (defs.length === 0) {
    if (alg) {
      box.innerHTML = '<div class="tsec" style="margin-top:0;border-top:none;color:rgba(255,255,255,.15)">No extra parameters for this algorithm</div>';
    }
    return;
  }
  // Section label
  const sec = document.createElement('div');
  sec.className = 'tsec';
  sec.style.marginTop = '0'; sec.style.borderTop = 'none';
  sec.textContent = (ALGO_NAMES[alg] || alg) + ' Parameters';
  box.appendChild(sec);

  for (const d of defs) {
    const wrap = document.createElement('div');
    wrap.className = 'og';
    const lbl = document.createElement('label');
    lbl.textContent = d.label;
    wrap.appendChild(lbl);

    if (d.type === 'select') {
      const sel = document.createElement('select');
      sel.id = 'tp_'+d.id; sel.className = ''; // inherit .og select
      sel.style.cssText = 'width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.72);padding:8px 10px;font:12px system-ui,sans-serif;border-radius:4px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none';
      for (const o of d.options) {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        opt.style.background = '#1a1a1a';
        if (o === d.def) opt.selected = true;
        sel.appendChild(opt);
      }
      wrap.appendChild(sel);
    } else {
      const row = document.createElement('div');
      row.className = 'srow';
      const inp = document.createElement('input');
      inp.type = 'range'; inp.id = 'tp_'+d.id;
      inp.min = d.min; inp.max = d.max; inp.step = d.step; inp.value = d.def;
      inp.style.cssText = 'flex:1;background:rgba(255,255,255,.1);border:none;border-radius:2px;height:4px;accent-color:rgba(255,255,255,.6);cursor:pointer';
      const val = document.createElement('span');
      val.className = 'sv'; val.style.width = '32px';
      val.textContent = d.fmt ? d.fmt(d.def) : d.def;
      inp.addEventListener('input', ()=>{ val.textContent = d.fmt ? d.fmt(+inp.value) : inp.value; });
      row.appendChild(inp); row.appendChild(val);
      wrap.appendChild(row);
    }
    box.appendChild(wrap);
  }
}

function readTuneParams(alg) {
  const out = {};
  const sv = document.getElementById('tSeed').value.trim();
  if (sv !== '') out.seed = Math.max(0, Math.min(9999999, parseInt(sv)|0));
  const defs = ALG_PARAMS[alg] || [];
  for (const d of defs) {
    const el = document.getElementById('tp_'+d.id);
    if (!el) continue;
    out[d.id] = d.type === 'select' ? parseInt(el.value) : parseFloat(el.value);
  }
  const formula = document.getElementById('tFormula').value.trim();
  if (formula) out.formula = formula;
  return out;
}

function applyTune() {
  if (busy) return;
  const base = hIdx >= 0 ? {...hist[hIdx]} : buildParams();
  const tune = readTuneParams(base.algorithm);
  if (tune.seed !== undefined) base.seed = tune.seed;
  if (tune.formula !== undefined) base.formula = tune.formula;
  else delete base.formula;
  base.tune = tune;
  hist = hist.slice(0, hIdx+1);
  hist.push(base);
  hIdx = hist.length - 1;
  renderParams(hist[hIdx]);
}

// Safe math formula evaluator — returns t in [0,1]
// vars: x,y (0-1 coords), v (algorithm natural value 0-1), s (seed)
function evalFormula(formula, x, y, v, s) {
  try {
    // eslint-disable-next-line no-new-func
    const result = new Function('x','y','v','s','sin','cos','tan','sqrt','abs','pow','log','floor','ceil','PI',
      '"use strict";return (' + formula + ');'
    )(x, y, v, s, Math.sin, Math.cos, Math.tan, Math.sqrt, Math.abs, Math.pow, Math.log, Math.floor, Math.ceil, Math.PI);
    if (typeof result !== 'number' || !isFinite(result)) return v;
    return Math.max(0, Math.min(1, result));
  } catch(e) { return v; }
}

// ═══ Render helpers ══════════════════════════════════════════════════
// Rich radial gradient background using darkest palette tones
function fillBg(palKey) {
  const p = PAL[palKey] || PAL.acid;
  const c0 = p[1], c1 = p[0];
  const gr = ctx.createRadialGradient(W*.5,H*.42,0, W*.5,H*.5, Math.hypot(W,H)*.6);
  gr.addColorStop(0,  `rgb(${c0[0]},${c0[1]},${c0[2]})`);
  gr.addColorStop(1,  `rgb(${c1[0]},${c1[1]},${c1[2]})`);
  ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);
}
// Soft glow — blurs a copy of the canvas and screen-composites it back
function bloom(alpha=0.28, blurPx=2.5) {
  const off = mkoff(W,H), octx = off.getContext('2d');
  octx.filter = `blur(${blurPx}px)`;
  octx.drawImage(canvas,0,0);
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=alpha;
  ctx.drawImage(off,0,0);
  ctx.restore();
}

// ═══ ALGORITHMS ══════════════════════════════════════════════════════

function renderAttractor(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const a=-2+rng()*4, b=-2+rng()*4, c=-2+rng()*4, d=-2+rng()*4;
  const iters=cplx*800000|0;
  let x=rng()*2-1, y=rng()*2-1;
  for(let i=0;i<500;i++){const nx=Math.sin(a*y)+c*Math.cos(a*x),ny=Math.sin(b*x)+d*Math.cos(b*y);x=nx;y=ny;}
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  const sx=new Float32Array(5000),sy=new Float32Array(5000);
  for(let i=0;i<5000;i++){const nx=Math.sin(a*y)+c*Math.cos(a*x),ny=Math.sin(b*x)+d*Math.cos(b*y);x=nx;y=ny;sx[i]=x;sy[i]=y;if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}
  const rw=x1-x0||1, rh=y1-y0||1, sc=Math.min(W/rw/1.1,H/rh/1.1);
  const ox=W/2-(x0+rw/2)*sc, oy=H/2-(y0+rh/2)*sc;
  const dens=new Uint32Array(W*H);
  for(let i=0;i<iters;i++){const nx=Math.sin(a*y)+c*Math.cos(a*x),ny=Math.sin(b*x)+d*Math.cos(b*y);x=nx;y=ny;const px=(x*sc+ox)|0,py=(y*sc+oy)|0;if(px>=0&&px<W&&py>=0&&py<H)dens[py*W+px]++;}
  // Draw gradient background first, then composite density plot on top
  fillBg(p.palette);
  const id=ctx.createImageData(W,H);
  let mx=0; for(let i=0;i<W*H;i++) if(dens[i]>mx)mx=dens[i];
  const lm=Math.log(mx+1);
  for(let i=0;i<W*H;i++){
    if(dens[i]>0){
      const t=Math.pow(Math.log(dens[i]+1)/lm, 0.75);
      const[r,g,b]=palRGB(p.palette,t);
      const j=i*4;id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
    }
    // alpha=0 pixels are transparent → fillBg gradient shows through
  }
  const off=mkoff(W,H); off.getContext('2d').putImageData(id,0,0);
  ctx.drawImage(off,0,0);
  bloom(0.32, 2.5);
}

function renderHarmonograph(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const freqMax = p.tune?.freqMax ?? 7;
  const dampScale = p.tune?.dampScale ?? 1;
  fillBg(p.palette);
  const n=2+Math.floor(cplx*.6);
  ctx.globalCompositeOperation='lighter';
  for(let ci=0;ci<n;ci++){
    const f1=1+rng()*freqMax,f2=1+rng()*freqMax,f3=1+rng()*freqMax,f4=1+rng()*freqMax;
    const q1=rng()*Math.PI*2,q2=rng()*Math.PI*2,q3=rng()*Math.PI*2,q4=rng()*Math.PI*2;
    const d1=(.0012+rng()*.005)*dampScale,d2=(.0012+rng()*.005)*dampScale,d3=(.0012+rng()*.005)*dampScale,d4=(.0012+rng()*.005)*dampScale;
    const sx=W*.44, sy=H*.44;
    const ct=ci/Math.max(1,n-1);
    // Two layers per curve: soft thick undercoat + fine bright top
    for(let pass=0;pass<2;pass++){
      ctx.beginPath();
      const steps=90000+pass*15000;
      for(let i=0;i<=steps;i++){
        const t=i*.045;
        const x=W/2+sx*(Math.sin(f1*t+q1)*Math.exp(-d1*t)+Math.sin(f2*t+q2)*Math.exp(-d2*t));
        const y=H/2+sy*(Math.sin(f3*t+q3)*Math.exp(-d3*t)+Math.sin(f4*t+q4)*Math.exp(-d4*t));
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      const palT=(ct+pass*.12)%1;
      ctx.strokeStyle=cstr(p.palette,.28+palT*.65, pass===0?.04+cplx*.004:.06+cplx*.005);
      ctx.lineWidth=pass===0?1.8+rng()*.8:0.5+rng()*.4;
      ctx.stroke();
    }
  }
  ctx.globalCompositeOperation='source-over';
  bloom(0.22,2);
}

function renderSubdivision(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const splitBias = p.tune?.splitBias ?? 0.5;
  const colorDrift = p.tune?.colorDrift ?? 0.18;
  fillBg(p.palette);
  const maxD=3+Math.floor(cplx*.8);
  function sub(x,y,w,h,d,co){
    const t=(co+rng()*colorDrift)%1;
    if(d<=0||w<6||h<6){
      // Radial gradient fill for depth
      const cx2=x+w/2, cy2=y+h/2, rad=Math.hypot(w,h)*.6;
      const gr=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,rad);
      gr.addColorStop(0,cstr(p.palette,Math.min(1,t+.1)));
      gr.addColorStop(1,cstr(p.palette,t));
      ctx.fillStyle=gr; ctx.fillRect(x,y,w,h);
      ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
      return;
    }
    if(rng()<(1-splitBias)&&w>50){
      const s=w*(rng()>.4?.35+rng()*.3:.5);
      sub(x,y,s,h,d-1,co); sub(x+s,y,w-s,h,d-1,co+colorDrift*.5+rng()*colorDrift);
    } else if(h>50){
      const s=h*(rng()>.4?.35+rng()*.3:.5);
      sub(x,y,w,s,d-1,co); sub(x,y+s,w,h-s,d-1,co+colorDrift*.5+rng()*colorDrift);
    } else {
      const cx2=x+w/2, cy2=y+h/2, rad=Math.hypot(w,h)*.6;
      const gr=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,rad);
      gr.addColorStop(0,cstr(p.palette,Math.min(1,t+.1)));
      gr.addColorStop(1,cstr(p.palette,t));
      ctx.fillStyle=gr; ctx.fillRect(x,y,w,h);
      ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    }
  }
  sub(0,0,W,H,maxD,rng()*.4);
}

function renderFourier(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const freqMax = p.tune?.freqMax ?? 16;
  const nkOverride = p.tune?.harmonics != null ? (p.tune.harmonics|0) : null;
  fillBg(p.palette);
  const nc=3+Math.floor(cplx*.6), nk=nkOverride ?? 5+Math.floor(cplx*2);
  ctx.globalCompositeOperation='lighter';
  for(let ci=0;ci<nc;ci++){
    const comps=Array.from({length:nk},()=>({
      r:(.03+rng()*.28)*Math.min(W,H),
      f:Math.floor(1+rng()*freqMax)*(rng()>.5?1:-1),
      ph:rng()*Math.PI*2,
    }));
    const t=ci/Math.max(1,nc-1);
    // Soft thick glow pass
    ctx.beginPath();
    for(let i=0;i<=3200;i++){
      const tt=i/3200*Math.PI*2; let x=W/2,y=H/2;
      for(const k of comps){x+=k.r*Math.cos(k.f*tt+k.ph);y+=k.r*Math.sin(k.f*tt+k.ph);}
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=cstr(p.palette,.22+t*.65,.05+cplx*.005);
    ctx.lineWidth=3+rng()*1.5; ctx.stroke();
    // Fine bright line on top
    ctx.beginPath();
    for(let i=0;i<=3200;i++){
      const tt=i/3200*Math.PI*2; let x=W/2,y=H/2;
      for(const k of comps){x+=k.r*Math.cos(k.f*tt+k.ph);y+=k.r*Math.sin(k.f*tt+k.ph);}
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=cstr(p.palette,.4+t*.55,.12+cplx*.012);
    ctx.lineWidth=.6+rng()*.5; ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
  bloom(0.28,2.2);
}

function renderPlasma(p) {
  const rng=mkrng(p.seed), cplx=p.complexity, scale=1.8;
  const freqScale = p.tune?.freqScale ?? 1;
  const gamma = p.tune?.gamma ?? 0.82;
  const iw=Math.ceil(W/scale)|0, ih=Math.ceil(H/scale)|0;
  const id=new ImageData(iw,ih);
  const f1=(1+rng()*6)*freqScale,f2=(1+rng()*6)*freqScale,f3=(1+rng()*5)*freqScale,f4=(1+rng()*5)*freqScale,f5=(1+rng()*4)*freqScale,f6=(1+rng()*4)*freqScale;
  const cx=.15+rng()*.7,cy=.15+rng()*.7;
  const ph1=rng()*Math.PI*2,ph2=rng()*Math.PI*2,ph3=rng()*Math.PI*2;
  const turbScale=.4+cplx*.08;
  const s=p.seed;
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){
    const nx=x/iw, ny=y/ih;
    let v=(Math.sin(nx*f1*Math.PI*2+ph1)
            +Math.sin(ny*f2*Math.PI*2+ph2)
            +Math.sin((nx+ny)*f3*Math.PI*2)
            +Math.sin(Math.sqrt((nx-cx)**2+(ny-cy)**2)*f4*Math.PI*8)
            +Math.sin((nx*f5-ny*f6)*Math.PI*2+ph3)*turbScale)/( 4+turbScale);
    let tv=Math.pow((v+1)/2, gamma);
    if(p.formula) tv=evalFormula(p.formula,nx,ny,tv,s);
    const[r,g,b]=palRGB(p.palette,tv);
    const j=(y*iw+x)*4; id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
  }
  const off=mkoff(iw,ih); off.getContext('2d').putImageData(id,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(off,0,0,W,H);
}

function renderDomainWarp(p) {
  const cplx=p.complexity, s=p.seed, scale=1.5;
  const warpStr = p.tune?.warpStr ?? 1;
  const octBonus = p.tune?.octBonus ?? 0;
  const iw=Math.ceil(W/scale)|0, ih=Math.ceil(H/scale)|0;
  const id=new ImageData(iw,ih);
  const ws=(.55+cplx*.2)*warpStr;
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){
    const nx=x/iw*3, ny=y/ih*3;
    const wx1=fbm(nx+.5,ny+9.2,s)*ws, wy1=fbm(nx+3.7,ny+2.1,s+500)*ws;
    const wx2=fbm(nx+wx1,ny+wy1,s+1000)*ws*.55, wy2=fbm(nx+wy1,ny+wx1,s+1500)*ws*.55;
    const v=fbm(nx+wx2,ny+wy2,s+9999,5+Math.floor(cplx*.35)+(octBonus|0));
    let tv=Math.pow(Math.max(0,Math.min(1,v*1.12+.04)), 0.88);
    if(p.formula) tv=evalFormula(p.formula,x/iw,y/ih,tv,s);
    const[r,g,b]=palRGB(p.palette,tv);
    const j=(y*iw+x)*4; id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
  }
  const off=mkoff(iw,ih); off.getContext('2d').putImageData(id,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(off,0,0,W,H);
}

function renderMandala(p) {
  const rng=mkrng(p.seed), scale=1.5, s=p.seed;
  const forceFolds = p.tune?.folds;
  const gamma = p.tune?.gamma ?? 0.85;
  const iw=Math.ceil(W/scale)|0, ih=Math.ceil(H/scale)|0;
  const id=new ImageData(iw,ih);
  const folds=forceFolds ?? [4,5,6,7,8,9,12][Math.floor(rng()*7)];
  const sec=Math.PI*2/folds;
  const style=Math.floor(rng()*3);
  const layers=2+Math.floor(rng()*3);
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){
    const nx=x/iw-.5, ny=y/ih-.5;
    const dist=Math.sqrt(nx*nx+ny*ny)*2;
    let fa=((Math.atan2(ny,nx)%sec)+sec)%sec;
    if(fa>sec/2) fa=sec-fa;
    const fx=Math.cos(fa)*dist*.5+.5, fy=Math.sin(fa)*dist*.5+.5;
    let t;
    if(style===0) t=fbm(fx*4,fy*4,s,4+layers)*.85+dist*.08;
    else if(style===1) t=((dist*(5+layers))%1+(fa/sec*folds*2)%1)*.5;
    else { const w2=fbm(fx*2.5,fy*2.5,s+999,3)*.3; t=fbm(fx+w2,fy+w2,s+500,4+layers)*.9+dist*.05; }
    // Sharper falloff + vignette ring + gamma
    t*=Math.max(0,1-(dist-.82)*10);
    t=Math.pow(Math.max(0,Math.min(1,t)), gamma);
    if(p.formula) t=evalFormula(p.formula,x/iw,y/ih,t,s);
    const[r,g,b]=palRGB(p.palette,t);
    const j=(y*iw+x)*4; id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
  }
  const off=mkoff(iw,ih); off.getContext('2d').putImageData(id,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(off,0,0,W,H);
  // Soft vignette ring
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.35,W/2,H/2,Math.min(W,H)*.52);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function renderReactionDiffusion(p, done) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  drawPlaceholder(p.palette, p.seed);
  const gw=160, gh=Math.floor(160*H/W)|0;
  const regimes=[{f:.035,k:.065},{f:.055,k:.062},{f:.025,k:.050},{f:.040,k:.060},{f:.030,k:.057}];
  const rdF=p.tune?.rdF, rdK=p.tune?.rdK;
  const {f,k}=rdF!=null ? {f:rdF,k:rdK??0.065} : regimes[Math.floor(rng()*regimes.length)];
  const iters=200+cplx*60|0;
  // Pre-allocate swap buffers — no allocation in the hot loop
  let A=new Float32Array(gw*gh).fill(1), B=new Float32Array(gw*gh);
  let nA=new Float32Array(gw*gh), nB=new Float32Array(gw*gh);
  for(let i=0;i<6+cplx;i++){
    const sx=rng()*gw|0, sy=rng()*gh|0, sr=3+rng()*10|0;
    for(let dy=-sr;dy<sr;dy++) for(let dx=-sr;dx<sr;dx++){
      const nx=((sx+dx)%gw+gw)%gw, ny=((sy+dy)%gh+gh)%gh;
      B[ny*gw+nx]=.5+rng()*.5; A[ny*gw+nx]=0;
    }
  }
  let iter=0;
  function chunk(){
    if(cancelFlag){done();return;}
    for(let c=0;c<20&&iter<iters;c++,iter++){
      for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){
        const i=y*gw+x;
        const xl=((x-1)+gw)%gw,xr=(x+1)%gw,yu=((y-1)+gh)%gh,yd=(y+1)%gh;
        const lA=A[yu*gw+x]+A[yd*gw+x]+A[y*gw+xl]+A[y*gw+xr]-4*A[i];
        const lB=B[yu*gw+x]+B[yd*gw+x]+B[y*gw+xl]+B[y*gw+xr]-4*B[i];
        const a=A[i],b=B[i],ab2=a*b*b;
        nA[i]=Math.max(0,Math.min(1,a+(lA-ab2+f*(1-a))));
        nB[i]=Math.max(0,Math.min(1,b+(.5*lB+ab2-(k+f)*b)));
      }
      const tmp=A;A=nA;nA=tmp; const tmp2=B;B=nB;nB=tmp2;
    }
    if(iter<iters){setTimeout(chunk,0);}
    else{
      const id=new ImageData(gw,gh);
      for(let i=0;i<gw*gh;i++){
        // Gamma + contrast for richer color separation
        const bv=Math.pow(Math.max(0,Math.min(1,B[i])),0.65);
        const[r,g,b]=palRGB(p.palette,bv);
        const j=i*4;id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
      }
      const off=mkoff(gw,gh); off.getContext('2d').putImageData(id,0,0);
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      ctx.drawImage(off,0,0,W,H); done();
    }
  }
  chunk();
}

function renderFractalIFS(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const tfCount = p.tune?.tfCount != null ? (p.tune.tfCount|0) : null;
  const n=tfCount ?? 3+Math.floor(rng()*4);
  const tfs=Array.from({length:n},()=>{
    const a=rng()*1.4-.7,b=rng()*1.4-.7,c=rng()*1.4-.7,d2=rng()*1.4-.7;
    const det=Math.abs(a*d2-b*c);
    return {a:a*(det>.01?.7/det:.5),b:b*(det>.01?.7/det:.5),c:c*(det>.01?.7/det:.5),d:d2*(det>.01?.7/det:.5),e:rng()*2-1,f:rng()*2-1,w:.1+rng()*.9};
  });
  const tw=tfs.reduce((s,t)=>s+t.w,0); tfs.forEach(t=>t.w/=tw);
  const iters=cplx*350000|0;
  let x=0,y=0;
  let bx0=Infinity,bx1=-Infinity,by0=Infinity,by1=-Infinity;
  for(let i=0;i<3000;i++){
    let r=rng(),cum=0,tf=tfs[0];
    for(const t of tfs){cum+=t.w;if(r<cum){tf=t;break;}}
    const nx=tf.a*x+tf.b*y+tf.e, ny=tf.c*x+tf.d*y+tf.f; x=nx;y=ny;
    if(i>50){if(x<bx0)bx0=x;if(x>bx1)bx1=x;if(y<by0)by0=y;if(y>by1)by1=y;}
  }
  const bw=bx1-bx0||1, bh=by1-by0||1, sc=Math.min(W/bw,H/bh)*.88;
  const ox=W/2-(bx0+bw/2)*sc, oy=H/2-(by0+bh/2)*sc;
  const dens=new Uint32Array(W*H);
  for(let i=0;i<iters;i++){
    let r=rng(),cum=0,tf=tfs[0];
    for(const t of tfs){cum+=t.w;if(r<cum){tf=t;break;}}
    const nx=tf.a*x+tf.b*y+tf.e, ny=tf.c*x+tf.d*y+tf.f; x=nx;y=ny;
    const px=(x*sc+ox)|0, py=(y*sc+oy)|0;
    if(px>=0&&px<W&&py>=0&&py<H) dens[py*W+px]++;
  }
  fillBg(p.palette);
  const id=ctx.createImageData(W,H);
  let mx=0; for(let i=0;i<W*H;i++) if(dens[i]>mx)mx=dens[i];
  const lm=Math.log(mx+1);
  for(let i=0;i<W*H;i++){
    if(dens[i]>0){
      const t=Math.pow(Math.log(dens[i]+1)/lm, 0.78);
      const[r,g,b]=palRGB(p.palette,t);
      const j=i*4;id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
    }
    // alpha=0 pixels are transparent → fillBg gradient shows through
  }
  const offifs=mkoff(W,H); offifs.getContext('2d').putImageData(id,0,0);
  ctx.drawImage(offifs,0,0);
  bloom(0.3,2.5);
}

function renderFlowField(p) {
  const rng=mkrng(p.seed), cplx=p.complexity, s=p.seed;
  const noiseScale = p.tune?.noiseScale ?? 1;
  const stepScale = p.tune?.stepScale ?? 1;
  fillBg(p.palette);
  const np=cplx*900|0, steps=90+cplx*20, ss=Math.min(W,H)*.004*stepScale, ns=(1.2+rng()*2.5)*noiseScale;
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<np;i++){
    let x=rng()*W, y=rng()*H;
    const ct=rng(), alpha=0.022+rng()*.018, lw=0.4+rng()*1.8;
    ctx.strokeStyle=cstr(p.palette,ct,alpha);
    ctx.lineWidth=lw; ctx.beginPath(); ctx.moveTo(x,y);
    for(let st=0;st<steps;st++){
      const a=fbm(x/W*ns,y/H*ns,s,3)*Math.PI*4;
      x+=Math.cos(a)*ss; y+=Math.sin(a)*ss;
      if(x<0||x>W||y<0||y>H) break;
      ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
  bloom(0.32,3);
}

function renderSpaceColonization(p) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const reach = p.tune?.reach ?? 1;
  const segScale = p.tune?.segScale ?? 1;
  fillBg(p.palette);
  const na=cplx*200|0;
  const sl=Math.min(W,H)*.009*segScale, ar=sl*9*reach, kr=sl*2.2;
  const atts=Array.from({length:na},()=>[rng()*W*1.1-W*.05, rng()*H*.88]);
  const rx=W*.25+rng()*W*.5;
  const nodes=[{x:rx,y:H*.95,par:-1,dep:0}];
  for(let it=0;it<320&&atts.length>0;it++){
    const ni=new Map();
    for(let ai=atts.length-1;ai>=0;ai--){
      const[ax,ay]=atts[ai]; let md2=Infinity,mn=-1;
      for(let k=0;k<nodes.length;k++){
        const d=Math.hypot(nodes[k].x-ax,nodes[k].y-ay);
        if(d<kr){mn=-2;break;} if(d<ar&&d<md2){md2=d;mn=k;}
      }
      if(mn===-2){atts.splice(ai,1);continue;}
      if(mn>=0){if(!ni.has(mn))ni.set(mn,[0,0,0]);const inf=ni.get(mn);const d=Math.hypot(ax-nodes[mn].x,ay-nodes[mn].y)||.001;inf[0]+=(ax-nodes[mn].x)/d;inf[1]+=(ay-nodes[mn].y)/d;inf[2]++;}
    }
    if(!ni.size) break;
    ni.forEach((inf,k)=>{const l=Math.hypot(inf[0],inf[1])||1;nodes.push({x:nodes[k].x+(inf[0]/l)*sl+(rng()-.5)*sl*.3,y:nodes[k].y+(inf[1]/l)*sl+(rng()-.5)*sl*.3,par:k,dep:nodes[k].dep+1});});
  }
  const md=nodes.reduce((m,n)=>Math.max(m,n.dep),0)||1;
  // Pass 1 — thick dim glow undercoat
  for(let i=1;i<nodes.length;i++){
    const n=nodes[i],par=nodes[n.par],t=n.dep/md;
    ctx.strokeStyle=cstr(p.palette,.22+t*.45,.12);
    ctx.lineWidth=Math.max(.8,(1-t)*9+1);
    ctx.beginPath(); ctx.moveTo(par.x,par.y); ctx.lineTo(n.x,n.y); ctx.stroke();
  }
  // Pass 2 — fine bright top line
  for(let i=1;i<nodes.length;i++){
    const n=nodes[i],par=nodes[n.par],t=n.dep/md;
    ctx.strokeStyle=cstr(p.palette,.45+t*.5,.72+t*.24);
    ctx.lineWidth=Math.max(.3,(1-t)*1.8+.3);
    ctx.beginPath(); ctx.moveTo(par.x,par.y); ctx.lineTo(n.x,n.y); ctx.stroke();
  }
}

function renderMetaballs(p) {
  const rng=mkrng(p.seed), cplx=p.complexity, scale=2.5;
  const iso = p.tune?.iso ?? 0.82;
  const sizeScale = p.tune?.sizeScale ?? 1;
  const s=p.seed;
  const nb=6+Math.floor(cplx*1.4); // min 6 so no single blob dominates
  const minD=Math.min(W,H);
  const minR=minD*.05, maxR=minD*.12; // was .08–.30, now much tighter ceiling
  // Grid-based placement — one ball per zone so they always spread across canvas
  const cols=Math.ceil(Math.sqrt(nb*(W/H))), rows=Math.ceil(nb/cols);
  const balls=Array.from({length:nb},(_,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    return {
      x:(col+.15+rng()*.7)/cols*W,
      y:(row+.15+rng()*.7)/rows*H,
      r:(minR+rng()*(maxR-minR))*sizeScale
    };
  });
  const iw=Math.ceil(W/scale)|0, ih=Math.ceil(H/scale)|0;
  const id=new ImageData(iw,ih);
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){
    const wx=x*scale, wy=y*scale;
    let f=0; for(const b of balls) f+=b.r*b.r/Math.max(1,(wx-b.x)**2+(wy-b.y)**2);
    let t;
    if(f>=iso){
      // Interior: bright core gradient
      t=Math.min(1,.45+(f-iso)/(2.5-iso)*.55);
    } else {
      // Exterior falloff
      t=Math.min(1,Math.pow(f/iso,1.8)*.45);
    }
    // Highlight ring near isosurface
    const rim=Math.abs(f-iso);
    if(rim<.1) t=Math.min(1,t+(.1-rim)/.1*.22);
    if(p.formula) t=evalFormula(p.formula,x/iw,y/ih,t,s);
    const[r,g,b]=palRGB(p.palette,t);
    const j=(y*iw+x)*4; id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
  }
  const off=mkoff(iw,ih); off.getContext('2d').putImageData(id,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(off,0,0,W,H);
}

function renderDifferentialGrowth(p, done) {
  const rng=mkrng(p.seed), cplx=p.complexity;
  const repScale = p.tune?.repScale ?? 1;
  const distScale = p.tune?.distScale ?? 1;
  // Draw immediate placeholder so screen is never black
  drawPlaceholder(p.palette, p.seed);
  const cx=W/2, cy=H/2, ir=Math.min(W,H)*.07;
  let pts=Array.from({length:20},(_,i)=>{const a=i/20*Math.PI*2;return{x:cx+Math.cos(a)*ir,y:cy+Math.sin(a)*ir};});
  const maxP=150+cplx*30|0, desD=Math.min(W,H)*.012*distScale;
  const maxD=desD*2.5, repR=desD*4.5, repS=.6*repScale, attS=.4;
  const iters=60+cplx*15|0;
  let it=0;
  function step(){
    if(cancelFlag){done();return;}
    for(let s=0;s<3&&it<iters;s++,it++){
      if(pts.length<maxP){
        const np=[];
        for(let i=0;i<pts.length;i++){
          np.push(pts[i]);
          const j=(i+1)%pts.length;
          if(Math.hypot(pts[j].x-pts[i].x,pts[j].y-pts[i].y)>maxD)
            np.push({x:(pts[i].x+pts[j].x)/2+(rng()-.5)*1.5,y:(pts[i].y+pts[j].y)/2+(rng()-.5)*1.5});
        }
        pts=np;
      }
      const n=pts.length;
      const fx=new Float32Array(n), fy=new Float32Array(n);
      // Only check every 3rd pair to limit O(n²) cost
      for(let i=0;i<n;i++){
        for(let j=i+4;j<n-3;j+=2){
          const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
          const d=Math.hypot(dx,dy)||.001;
          if(d<repR){const f=repS*(1-d/repR)/d;fx[i]+=dx*f;fy[i]+=dy*f;fx[j]-=dx*f;fy[j]-=dy*f;}
        }
        const pr=(i-1+n)%n, nx2=(i+1)%n;
        fx[i]+=(pts[pr].x+pts[nx2].x-2*pts[i].x)*attS;
        fy[i]+=(pts[pr].y+pts[nx2].y-2*pts[i].y)*attS;
      }
      for(let i=0;i<n;i++){
        pts[i].x=Math.max(15,Math.min(W-15,pts[i].x+fx[i]*.45));
        pts[i].y=Math.max(15,Math.min(H-15,pts[i].y+fy[i]*.45));
      }
    }
    if(it<iters){setTimeout(step,0);}
    else{
      fillBg(p.palette);
      // Glow halo (thick, additive)
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      ctx.strokeStyle=cstr(p.palette,.55,.1); ctx.lineWidth=12; ctx.stroke();
      ctx.restore();
      // Interior radial gradient fill
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.min(W,H)*.48);
      gr.addColorStop(0,cstr(p.palette,.68,.5));
      gr.addColorStop(.6,cstr(p.palette,.42,.38));
      gr.addColorStop(1,cstr(p.palette,.22,.12));
      ctx.fillStyle=gr; ctx.fill();
      // Crisp bright outline
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      ctx.strokeStyle=cstr(p.palette,.88,.9); ctx.lineWidth=1.4; ctx.stroke();
      done();
    }
  }
  step();
}

// ═══ Placeholder — drawn instantly before async renders ══════════════
function drawPlaceholder(palKey, seed) {
  const s=seed;
  // Higher-res domain-warp preview at W/5 — visually richer than W/8
  const iw=Math.ceil(W/5)|0, ih=Math.ceil(H/5)|0;
  const id=new ImageData(iw,ih);
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){
    const nx=x/iw*2.8, ny=y/ih*2.8;
    const wx=fbm(nx+.5,ny+8.2,s)*.65, wy=fbm(nx+7.3,ny+.5,s+400)*.65;
    const wx2=fbm(nx+wx,ny+wy,s+900)*.3, wy2=fbm(nx+wy,ny+wx,s+1200)*.3;
    const v=fbm(nx+wx2,ny+wy2,s+800,4);
    const tv=Math.pow(Math.max(0,Math.min(1,v)),0.9);
    const[r,g,b]=palRGB(palKey,tv);
    const j=(y*iw+x)*4; id.data[j]=r;id.data[j+1]=g;id.data[j+2]=b;id.data[j+3]=255;
  }
  const off=mkoff(iw,ih); off.getContext('2d').putImageData(id,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(off,0,0,W,H);
}

// ═══ Symmetry ════════════════════════════════════════════════════════
function applySymmetry(sym) {
  if(sym==='none') return;
  const off=mkoff(W,H); off.getContext('2d').drawImage(canvas,0,0);
  if(sym==='mirror'){
    ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
    ctx.drawImage(off,0,0,W/2,H,0,0,W/2,H); ctx.restore();
  } else if(sym==='mirrorxy'){
    ctx.save(); ctx.translate(W,0); ctx.scale(-1,1); ctx.drawImage(off,0,0,W/2,H,0,0,W/2,H); ctx.restore();
    ctx.save(); ctx.translate(0,H); ctx.scale(1,-1); ctx.drawImage(off,0,0,W,H/2,0,0,W,H/2); ctx.restore();
    ctx.save(); ctx.translate(W,H); ctx.scale(-1,-1); ctx.drawImage(off,0,0,W/2,H/2,0,0,W/2,H/2); ctx.restore();
  } else if(sym.startsWith('radial')){
    const n=+sym.replace('radial',''), a=Math.PI*2/n;
    for(let i=1;i<n;i++){
      ctx.save(); ctx.globalAlpha=.75;
      ctx.translate(W/2,H/2); ctx.rotate(i*a); ctx.translate(-W/2,-H/2);
      ctx.drawImage(off,0,0); ctx.restore();
    }
  }
}

// ═══ Dispatch ════════════════════════════════════════════════════════
const ASYNC=['reactiondiffusion','differentialgrowth'];
function dispatch(p, done) {
  drawPlaceholder(p.palette, p.seed);
  const finish=()=>{applySymmetry(p.symmetry);done();};
  if(p.algorithm==='reactiondiffusion') return renderReactionDiffusion(p,finish);
  if(p.algorithm==='differentialgrowth') return renderDifferentialGrowth(p,finish);
  if(p.algorithm==='attractor')         renderAttractor(p);
  else if(p.algorithm==='harmonograph') renderHarmonograph(p);
  else if(p.algorithm==='subdivision')  renderSubdivision(p);
  else if(p.algorithm==='fourier')      renderFourier(p);
  else if(p.algorithm==='plasma')       renderPlasma(p);
  else if(p.algorithm==='domainwarp')   renderDomainWarp(p);
  else if(p.algorithm==='mandala')      renderMandala(p);
  else if(p.algorithm==='fractalifs')   renderFractalIFS(p);
  else if(p.algorithm==='flowfield')    renderFlowField(p);
  else if(p.algorithm==='spacecolonization') renderSpaceColonization(p);
  else if(p.algorithm==='metaballs')    renderMetaballs(p);
  finish();
}

// ═══ History ═════════════════════════════════════════════════════════
function buildParams() {
  let fam=document.getElementById('sFam').value;
  if(fam==='random'){const keys=Object.keys(ALGOS);fam=keys[Math.random()*keys.length|0];}
  let alg=document.getElementById('sAlg').value;
  if(alg==='random') alg=ALGOS[fam][Math.random()*ALGOS[fam].length|0];
  let pal=document.getElementById('sPal').value;
  if(pal==='random') pal=RANDOM_PAL_KEYS[Math.random()*RANDOM_PAL_KEYS.length|0];
  const p = {family:fam,algorithm:alg,palette:pal,complexity:+document.getElementById('sComp').value,
             symmetry:document.getElementById('sSym').value,orientation:orient,seed:Math.random()*9999999|0,
             tune:{}};
  // Merge tune overrides (seed lock, formula, algorithm knobs)
  const tune = readTuneParams(p.algorithm);
  if (tune.seed !== undefined) p.seed = tune.seed;
  if (tune.formula !== undefined) p.formula = tune.formula;
  p.tune = tune;
  return p;
}

function generate() {
  if(busy){cancelFlag=true;setTimeout(generate,60);return;}
  const params=buildParams();
  hist=hist.slice(0,hIdx+1); hist.push(params); hIdx=hist.length-1;
  renderParams(hist[hIdx]);
}

function renderParams(p) {
  cancelFlag=false; busy=true;
  canvas.style.opacity='0.35';
  document.getElementById('loading').style.display='block';
  resizeCanvas();
  dispatch(p, ()=>{
    busy=false;
    document.getElementById('loading').style.display='none';
    canvas.style.filter=inverted?'invert(1)':'';
    canvas.style.opacity='1';
    updateTimeline(); updateNav();
    // Refresh tune panel sliders when algo changes
    if (document.getElementById('tune').classList.contains('open'))
      buildTunePanel(p.algorithm);
  });
}

function goBack()    { if(hIdx>0&&!busy){hIdx--;renderParams(hist[hIdx]);} }
function goForward() { if(hIdx<hist.length-1&&!busy){hIdx++;renderParams(hist[hIdx]);} }

// ═══ Timeline ════════════════════════════════════════════════════════
const TL_VIS = () => window.innerWidth < 768 ? 4 : 14; // 4 on mobile, 14 on desktop
let tlOffset = 0;  // first visible index in hist

function tlScroll(dir) {
  const max = Math.max(0, hist.length - TL_VIS());
  tlOffset = Math.max(0, Math.min(max, tlOffset + dir));
  updateTimeline();
}

function updateTimeline() {
  // Keep selected dot in view
  const vis = TL_VIS();
  if (hIdx < tlOffset) tlOffset = hIdx;
  if (hIdx >= tlOffset + vis) tlOffset = hIdx - vis + 1;
  tlOffset = Math.max(0, Math.min(Math.max(0, hist.length - vis), tlOffset));

  const tl = document.getElementById('timeline'); tl.innerHTML = '';
  const end = Math.min(hist.length, tlOffset + vis);
  for (let i = tlOffset; i < end; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === hIdx ? ' cur' : '');
    const idx = i;
    d.onclick = () => { if (!busy) { hIdx = idx; renderParams(hist[idx]); } };
    tl.appendChild(d);
  }

  const canLeft  = tlOffset > 0;
  const canRight = tlOffset + vis < hist.length;
  document.getElementById('tlLeft').disabled  = !canLeft;
  document.getElementById('tlRight').disabled = !canRight;
}
function updateNav() {
  document.getElementById('bBack').disabled=hIdx<=0;
  document.getElementById('bFwd').disabled=hIdx>=hist.length-1;
}

// ═══ UI ══════════════════════════════════════════════════════════════
function toggleUI() {
  uiHidden=!uiHidden;
  const ui=document.getElementById('ui');
  ui.style.opacity=uiHidden?'0':'1';
  ui.style.pointerEvents=uiHidden?'none':'';
  if(uiHidden){
    document.getElementById('panel').classList.remove('open');
    document.getElementById('tune').classList.remove('open');
    document.getElementById('bTune').classList.remove('lit');
  }
}
function toggleInvert() {
  inverted=!inverted;
  canvas.style.filter=inverted?'invert(1)':'';
  document.getElementById('bInv').classList.toggle('lit',inverted);
}
function togglePanel() { document.getElementById('panel').classList.toggle('open'); }
function setOrient(o) {
  orient=o;
  document.getElementById('bLand').classList.toggle('on',o==='landscape');
  document.getElementById('bPort').classList.toggle('on',o==='portrait');
  resizeCanvas(); if(hist.length>0) renderParams(hist[hIdx]);
}
function savePNG() {
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) window.open(url,'_blank');
    else{const a=document.createElement('a');a.href=url;a.download='abstract_'+Date.now()+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}
  },'image/png');
}
function rebuildAlgos() {
  const fam=document.getElementById('sFam').value;
  const sel=document.getElementById('sAlg'); sel.innerHTML='<option value="random">Random</option>';
  const fams=fam==='random'?Object.keys(ALGOS):[fam];
  for(const f of fams){
    const g=document.createElement('optgroup'); g.label=f.charAt(0).toUpperCase()+f.slice(1);
    for(const a of ALGOS[f]){const o=document.createElement('option');o.value=a;o.textContent=ALGO_NAMES[a]||a;g.appendChild(o);}
    sel.appendChild(g);
  }
}

// ═══ Draggable panels ════════════════════════════════════════════════
(function makeDraggable(panel, hdr){
  let drag=false, ox=0, oy=0;
  const start=e=>{drag=true;const r=panel.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;panel.style.transition='none';e.preventDefault();};
  const move=e=>{if(!drag)return;let px=e.clientX-ox,py=e.clientY-oy;px=Math.max(0,Math.min(window.innerWidth-panel.offsetWidth,px));py=Math.max(0,Math.min(window.innerHeight-panel.offsetHeight,py));panel.style.right='auto';panel.style.left=px+'px';panel.style.top=py+'px';};
  const end=()=>{drag=false;};
  hdr.addEventListener('mousedown',start);
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',end);
  hdr.addEventListener('touchstart',e=>start({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY,preventDefault:()=>e.preventDefault()}),{passive:false});
  document.addEventListener('touchmove',e=>{if(drag){move({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});e.preventDefault();}},{passive:false});
  document.addEventListener('touchend',end);
})(document.getElementById('tune'), document.getElementById('th'));

(function(){
  const panel=document.getElementById('panel'), hdr=document.getElementById('ph');
  let drag=false, ox=0, oy=0;
  const start=e=>{drag=true;const r=panel.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;panel.style.transition='none';e.preventDefault();};
  const move=e=>{if(!drag)return;let px=e.clientX-ox,py=e.clientY-oy;px=Math.max(0,Math.min(window.innerWidth-panel.offsetWidth,px));py=Math.max(0,Math.min(window.innerHeight-panel.offsetHeight,py));panel.style.right='auto';panel.style.left=px+'px';panel.style.top=py+'px';};
  const end=()=>{drag=false;};
  hdr.addEventListener('mousedown',start);
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',end);
  hdr.addEventListener('touchstart',e=>start({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY,preventDefault:()=>e.preventDefault()}),{passive:false});
  document.addEventListener('touchmove',e=>{if(drag){move({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});e.preventDefault();}},{passive:false});
  document.addEventListener('touchend',end);
})();

// ═══ Init ════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{resizeCanvas();if(hist.length>0&&!busy)renderParams(hist[hIdx]);});
rebuildAlgos(); updateNav(); resizeCanvas(); generate();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
